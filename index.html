<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐋𝐓𝐄𝐒𝐒🦋𝐊𝐀𝐑𝐌𝐀❥ღ · Signal Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: #0a0000;
        }

        .bg-image {
            position: absolute;
            width: 140%;
            height: 140%;
            top: -20%;
            left: -20%;
            object-fit: cover;
            opacity: 0.55;
            filter: blur(0.5px) brightness(0.7) saturate(1.4);
            animation: bgDrift 35s infinite alternate ease-in-out;
        }

        @keyframes bgDrift {
            0% { transform: translate(0%, 0%) scale(1) rotate(0deg); }
            20% { transform: translate(-10%, -6%) scale(1.1) rotate(2deg); }
            40% { transform: translate(6%, 10%) scale(0.92) rotate(-2deg); }
            60% { transform: translate(-6%, -10%) scale(1.08) rotate(1.5deg); }
            80% { transform: translate(10%, 6%) scale(0.95) rotate(-1.5deg); }
            100% { transform: translate(0%, 0%) scale(1.03) rotate(0.5deg); }
        }

        .red-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 40%, rgba(180, 0, 0, 0.15), rgba(0, 0, 0, 0.4) 70%);
            mix-blend-mode: multiply;
            animation: pulseOverlay 10s infinite alternate ease-in-out;
        }

        @keyframes pulseOverlay {
            0% { opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { opacity: 0.3; }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            animation: orbMove 22s infinite alternate ease-in-out;
        }

        .orb:nth-child(1) {
            width: 600px;
            height: 600px;
            background: #ff0040;
            top: -10%;
            left: -10%;
            animation-duration: 22s;
        }
        .orb:nth-child(2) {
            width: 500px;
            height: 500px;
            background: #ff2200;
            bottom: -15%;
            right: -10%;
            animation-duration: 26s;
            animation-delay: -4s;
        }
        .orb:nth-child(3) {
            width: 450px;
            height: 450px;
            background: #cc00ff;
            top: 50%;
            left: 60%;
            animation-duration: 20s;
            animation-delay: -8s;
            opacity: 0.1;
        }
        .orb:nth-child(4) {
            width: 400px;
            height: 400px;
            background: #ff0066;
            top: 20%;
            right: 20%;
            animation-duration: 24s;
            animation-delay: -12s;
            opacity: 0.15;
        }

        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(150px, -100px) scale(1.2); }
            50% { transform: translate(-80px, 150px) scale(0.8); }
            75% { transform: translate(100px, 80px) scale(1.15); }
            100% { transform: translate(-130px, -130px) scale(0.85); }
        }

        .moving-line {
            position: absolute;
            background: rgba(255, 30, 30, 0.06);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.03);
            pointer-events: none;
        }

        .moving-line.h {
            height: 1px;
            width: 200%;
            left: -50%;
            animation: slideH 12s linear infinite;
        }
        .moving-line.v {
            width: 1px;
            height: 200%;
            top: -50%;
            animation: slideV 14s linear infinite;
        }
        .moving-line.diag {
            width: 200%;
            height: 1px;
            left: -50%;
            transform-origin: center;
            animation: slideDiag 18s linear infinite;
        }

        @keyframes slideH {
            0% { transform: translateX(0); }
            100% { transform: translateX(50%); }
        }
        @keyframes slideV {
            0% { transform: translateY(0); }
            100% { transform: translateY(50%); }
        }
        @keyframes slideDiag {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(50%) rotate(5deg); }
        }

        .moving-line.h:nth-child(5) { top: 10%; animation-duration: 14s; animation-delay: -2s; }
        .moving-line.h:nth-child(6) { top: 25%; animation-duration: 18s; animation-delay: -6s; }
        .moving-line.h:nth-child(7) { top: 40%; animation-duration: 16s; animation-delay: -1s; }
        .moving-line.h:nth-child(8) { top: 55%; animation-duration: 20s; animation-delay: -9s; }
        .moving-line.h:nth-child(9) { top: 70%; animation-duration: 22s; animation-delay: -4s; }
        .moving-line.h:nth-child(10) { top: 85%; animation-duration: 15s; animation-delay: -7s; }

        .moving-line.v:nth-child(11) { left: 8%; animation-duration: 16s; animation-delay: -3s; }
        .moving-line.v:nth-child(12) { left: 22%; animation-duration: 20s; animation-delay: -8s; }
        .moving-line.v:nth-child(13) { left: 36%; animation-duration: 18s; animation-delay: -2s; }
        .moving-line.v:nth-child(14) { left: 50%; animation-duration: 22s; animation-delay: -6s; }
        .moving-line.v:nth-child(15) { left: 64%; animation-duration: 17s; animation-delay: -1s; }
        .moving-line.v:nth-child(16) { left: 78%; animation-duration: 19s; animation-delay: -5s; }
        .moving-line.v:nth-child(17) { left: 92%; animation-duration: 21s; animation-delay: -9s; }

        .moving-line.diag:nth-child(18) { top: 20%; animation-duration: 20s; animation-delay: -4s; }
        .moving-line.diag:nth-child(19) { top: 50%; animation-duration: 24s; animation-delay: -10s; }
        .moving-line.diag:nth-child(20) { top: 75%; animation-duration: 18s; animation-delay: -2s; }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #ff3333;
            box-shadow: 0 0 15px #ff0000, 0 0 35px rgba(255, 0, 0, 0.15);
            opacity: 0;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(0.3); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.3); opacity: 0; }
        }

        #bg-music {
            display: none;
        }

        /* ===== ACCESS OVERLAY ===== */
        #access-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        #access-overlay.hidden { display: none; }

        #access-overlay .logo {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.9), 0 0 120px rgba(255, 0, 0, 0.4);
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        #access-overlay .logo span { color: #ff0000; }

        #access-overlay .sub {
            color: #ff3333;
            font-size: 14px;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 30px rgba(255,0,0,0.5);
            margin-bottom: 10px;
        }

        #access-overlay .lock-icon {
            font-size: 48px;
            margin-bottom: 10px;
            opacity: 0.9;
            filter: drop-shadow(0 0 30px rgba(255,0,0,0.6));
        }

        #access-overlay input {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 0, 0, 0.4);
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 22px;
            color: #fff;
            text-align: center;
            width: 240px;
            outline: none;
            letter-spacing: 10px;
            font-family: 'Courier New', monospace;
            transition: 0.3s;
        }
        #access-overlay input:focus {
            border-color: #ff1a1a;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
        }
        #access-overlay .btn-access {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 14px 56px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);
        }
        #access-overlay .btn-access:hover {
            transform: scale(1.06);
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.6);
        }
        #access-overlay .error-msg {
            color: #ff6666;
            font-size: 14px;
            min-height: 20px;
            font-family: 'Courier New', monospace;
        }

        /* ===== MAIN CONTENT ===== */
        #main-content {
            display: none;
            position: relative;
            z-index: 10;
            background: transparent;
            padding: 20px 30px;
            max-width: 750px;
            width: 100%;
            margin: 20px auto;
        }
        #main-content.visible { display: block; }

        .header-image {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 16px;
            opacity: 0.85;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.08);
        }

        .main-logo {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 0 70px rgba(255, 255, 255, 0.1), 0 0 50px rgba(255, 0, 0, 0.3);
            text-align: center;
            font-family: 'Courier New', monospace;
            margin-bottom: 2px;
        }
        .main-logo span {
            color: #ff1a1a;
            text-shadow: 0 0 80px rgba(255, 0, 0, 0.6);
        }

        .main-sub {
            text-align: center;
            color: #ff4444;
            font-size: 13px;
            letter-spacing: 8px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 0, 0, 0.08);
            padding-bottom: 14px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 30px rgba(255,0,0,0.15);
        }

        .form-group {
            margin-bottom: 14px;
            text-align: left;
        }
        .form-group label {
            color: #dddddd;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 4px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 10px 16px;
            color: #f0f0f0;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: 0.25s;
            backdrop-filter: blur(4px);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: rgba(255, 50, 50, 0.3);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.05);
            background: rgba(0, 0, 0, 0.5);
        }
        .form-group select option {
            background: #111;
            color: #eee;
        }
        .form-group textarea {
            min-height: 60px;
            resize: vertical;
        }

        .generated-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 0, 0, 0.08);
            border-radius: 16px;
            padding: 16px 18px;
            margin: 14px 0 18px;
            text-align: left;
            display: none;
            max-height: 500px;
            overflow-y: auto;
            min-height: 50px;
            backdrop-filter: blur(4px);
        }
        .generated-box.visible { display: block; }
        .generated-box .msg-title {
            color: #ff5555;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(255,0,0,0.15);
        }
        .generated-box .msg-content {
            color: #eeeeee;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        .generated-box .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #ff3333;
            animation: blink 0.7s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
            letter-spacing: 1px;
            flex: 1 1 auto;
            min-width: 120px;
            font-family: 'Courier New', monospace;
        }
        .btn-generate {
            background: rgba(255, 26, 26, 0.8);
            color: #fff;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.15);
            backdrop-filter: blur(4px);
        }
        .btn-generate:hover {
            background: rgba(204, 0, 0, 0.9);
            transform: scale(1.03);
            box-shadow: 0 0 70px rgba(255, 0, 0, 0.25);
        }
        .btn-generate:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-copy {
            background: rgba(255, 255, 255, 0.04);
            color: #ddd;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(4px);
        }
        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-copy:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-whatsapp {
            background: rgba(37, 211, 102, 0.7);
            color: #fff;
            box-shadow: 0 0 50px rgba(37, 211, 102, 0.08);
            backdrop-filter: blur(4px);
        }
        .btn-whatsapp:hover {
            background: rgba(29, 168, 81, 0.85);
            transform: scale(1.03);
        }
        .btn-whatsapp:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 0, 0, 0.7);
            border: 1px solid rgba(255, 0, 0, 0.1);
            padding: 10px 24px;
            border-radius: 40px;
            color: #ddd;
            font-size: 13px;
            z-index: 1002;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            font-family: 'Courier New', monospace;
            backdrop-filter: blur(10px);
        }
        .toast.show { opacity: 1; }

        .status-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            margin-top: 6px;
            font-family: 'Courier New', monospace;
            min-height: 18px;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .footer-link {
            text-align: center;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 0, 0, 0.05);
            font-family: 'Courier New', monospace;
        }
        .footer-link a {
            color: rgba(255, 85, 85, 0.6);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 3px;
            transition: 0.3s;
            text-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .footer-link a:hover {
            color: rgba(255, 0, 0, 0.9);
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
        }

        .whatsapp-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            margin-top: 6px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        @media (max-width: 600px) {
            #main-content { padding: 15px; margin: 5px; }
            .main-logo { font-size: 24px; letter-spacing: 2px; }
            #access-overlay .logo { font-size: 28px; letter-spacing: 4px; }
            #access-overlay input { width: 200px; font-size: 18px; }
            .header-image { max-height: 140px; }
        }
    </style>
</head>
<body>

    <!-- ===== ANIMATED BACKGROUND ===== -->
    <div class="bg-container">
        <img class="bg-image" id="bg-image" src="" alt="background" onerror="this.style.display='none'">
        <div class="red-overlay"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>

        <div class="moving-line h"></div>
        <div class="moving-line h"></div>
        <div class="moving-line h"></div>
        <div class="moving-line h"></div>
        <div class="moving-line h"></div>
        <div class="moving-line h"></div>

        <div class="moving-line v"></div>
        <div class="moving-line v"></div>
        <div class="moving-line v"></div>
        <div class="moving-line v"></div>
        <div class="moving-line v"></div>
        <div class="moving-line v"></div>
        <div class="moving-line v"></div>

        <div class="moving-line diag"></div>
        <div class="moving-line diag"></div>
        <div class="moving-line diag"></div>

        <div id="particle-container"></div>
    </div>

    <!-- ===== MUSIC ===== -->
    <audio id="bg-music" loop>
        <source src="song.mp3.m4a" type="audio/mp4">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <!-- ===== ACCESS OVERLAY ===== -->
    <div id="access-overlay">
        <div class="lock-icon">⛔</div>
        <div class="logo">𝐀𝐋𝐓𝐄𝐒𝐒🦋𝐊𝐀𝐑𝐌𝐀❥ღ</div>
        <div class="sub">Access Restricted</div>
        <input type="password" id="access-input" placeholder="••••" maxlength="4" autofocus>
        <button class="btn-access" onclick="checkAccess()">ENTER</button>
        <div class="error-msg" id="access-error"></div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== MAIN CONTENT ===== -->
    <div id="main-content">
        <img class="header-image" id="header-image" src="" alt="𝐀𝐋𝐓𝐄𝐒𝐒🦋𝐊𝐀𝐑𝐌𝐀❥ღ" onerror="this.style.display='none'">

        <div class="main-logo">𝐀𝐋𝐓𝐄𝐒𝐒🦋𝐊𝐀𝐑𝐌𝐀❥ღ</div>
        <div class="main-sub">⚡ Signal Generator ⚡</div>

        <div class="form-group">
            <label>👤 Name / Username of the abuser</label>
            <input type="text" id="nom" placeholder="Ex: John DOE or @username">
        </div>

        <div class="form-group">
            <label>📱 Their WhatsApp number</label>
            <input type="text" id="numero" placeholder="+221 70 820 15 85">
        </div>

        <div class="form-group">
            <label>⚠️ Type of violation</label>
            <select id="type">
                <option value="harassment">Harassment / Bullying</option>
                <option value="scam">Scam / Fraud</option>
                <option value="identity">Identity Theft</option>
                <option value="illegal">Illegal Content</option>
                <option value="threats">Threats / Violence</option>
                <option value="impersonation">Impersonation</option>
                <option value="doxxing">Doxxing / Private info leaked</option>
                <option value="other">Other (serious)</option>
            </select>
        </div>

        <div class="form-group">
            <label>📝 What happened ? (be specific)</label>
            <textarea id="details" placeholder="Describe exactly what this person did, when, and how it affected you..."></textarea>
        </div>

        <div class="generated-box" id="generated-box">
            <div class="msg-title">📨 GENERATING MESSAGE...</div>
            <div class="msg-content" id="message-output">
                <span class="cursor-blink"></span>
            </div>
        </div>

        <div class="status-text" id="status-text">Fill the form and click GENERATE</div>

        <div class="btn-group">
            <button class="btn btn-generate" id="btn-generate" onclick="startGeneration()">⚡ GENERATE</button>
            <button class="btn btn-copy" id="btn-copy" disabled onclick="copyMessage()">📋 COPY</button>
            <button class="btn btn-whatsapp" id="btn-wa" disabled onclick="sendWhatsApp()">💬 WHATSAPP</button>
        </div>

        <div class="whatsapp-note">📌 Message copied — paste in WhatsApp Support</div>

        <div class="footer-link">
            <a href="https://ablaye2020.github.io" target="_blank">ablaye2020.github.io</a>
        </div>
    </div>

    <script>
        // ===== IMAGES =====
        const imageUrl = "5133BE2E-F487-4BF7-A1F6-AFB00F0CBE51.jpeg";

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('bg-image').src = imageUrl;
            document.getElementById('header-image').src = imageUrl;
        });

        // ===== MUSIC =====
        let musicStarted = false;

        function startMusic() {
            if (musicStarted) return;
            const audio = document.getElementById('bg-music');
            audio.play().then(() => {
                musicStarted = true;
            }).catch(() => {});
        }

        document.addEventListener('click', startMusic, { once: true });
        document.addEventListener('touchstart', startMusic, { once: true });

        // ===== PARTICLES =====
        (function createParticles() {
            const container = document.getElementById('particle-container');
            const count = 45;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = 2 + Math.random() * 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDuration = (15 + Math.random() * 25) + 's';
                p.style.animationDelay = Math.random() * 20 + 's';
                const tx = (Math.random() - 0.5) * 400;
                const ty = (Math.random() - 0.5) * 400;
                p.style.setProperty('--tx', tx + 'px');
                p.style.setProperty('--ty', ty + 'px');
                const hue = 340 + Math.random() * 30;
                p.style.background = `hsl(${hue}, 95%, 55%)`;
                p.style.boxShadow = `0 0 20px hsl(${hue}, 95%, 55%)`;
                container.appendChild(p);
            }
        })();

        // ===== ACCESS =====
        const ACCESS_CODE = '1200';

        function checkAccess() {
            const input = document.getElementById('access-input');
            const error = document.getElementById('access-error');
            if (input.value === ACCESS_CODE) {
                document.getElementById('access-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                error.textContent = '';
                startMusic();
            } else {
                error.textContent = '❌ Incorrect code';
                input.value = '';
                input.focus();
            }
        }

        document.getElementById('access-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkAccess();
        });

        // ===== GENERATOR =====
        let isGenerating = false;
        let displayText = '';

        function generateFullMessage() {
            const nom = document.getElementById('nom').value.trim();
            const numero = document.getElementById('numero').value.trim();
            const type = document.getElementById('type').value;
            const details = document.getElementById('details').value.trim();

            const typeLabels = {
                harassment: "harcèlement et intimidation",
                scam: "arnaque et fraude",
                identity: "usurpation d'identité",
                illegal: "contenu illégal",
                threats: "menaces et violence",
                impersonation: "usurpation d'identité",
                doxxing: "doxxing / fuite d'informations privées",
                other: "violation grave"
            };

            const typeFr = typeLabels[type] || "violation grave";

            let msg = '';

            msg += `Bonjour l'équipe WhatsApp,\n\n`;

            msg += `Je vous écris pour vous signaler un cas TRÈS GRAVE concernant un utilisateur de votre plateforme. Je suis victime d'actes répétés qui mettent ma sécurité en danger et je vous demande d'agir IMMÉDIATEMENT.\n\n`;

            if (nom) {
                msg += `🔴 L'utilisateur concerné s'appelle : ${nom}\n`;
            } else {
                msg += `🔴 L'utilisateur concerné est inconnu (numéro ci-dessous)\n`;
            }

            if (numero) {
                msg += `📱 Son numéro WhatsApp : ${numero}\n`;
            }

            msg += `\n📌 CE QU'IL/ELLE A FAIT :\n`;
            if (details) {
                msg += `${details}\n\n`;
            } else {
                msg += `Cette personne m'a harcelé, menacé et a partagé des informations privées me concernant sans mon consentement. J'ai des preuves de tout cela (captures d'écran, enregistrements, messages).\n\n`;
            }

            msg += `⚠️ TYPE DE VIOLATION : ${typeFr.toUpperCase()}\n\n`;

            msg += `Cela fait maintenant plusieurs jours/semaines que ça dure et je suis épuisé(e). Cette personne utilise votre plateforme pour m'attaquer et je ne me sens plus en sécurité. J'ai peur pour moi et pour ma famille.\n\n`;

            msg += `J'AI DÉJÀ :\n`;
            msg += `→ Bloqué ce numéro mais il/elle crée de nouveaux comptes\n`;
            msg += `→ Signalé plusieurs fois mais rien ne change\n`;
            msg += `→ Je suis allé(e) voir la police qui m'a dit de contacter WhatsApp\n\n`;

            msg += `CE QUE JE DEMANDE :\n`;
            msg += `→ BANNIR DÉFINITIVEMENT ce compte et cette personne de WhatsApp\n`;
            msg += `→ CONSERVER TOUS LES ÉCHANGES pour que la police puisse enquêter\n`;
            msg += `→ ME RÉPONDRE RAPIDEMENT avec des actions concrètes\n\n`;

            msg += `Je vous en supplie, prenez ce signalement au sérieux. Je ne sais plus quoi faire. Cette personne continue à me harceler et je n'ai plus de paix.\n\n`;

            msg += `J'ai TOUTES LES PREUVES et je suis prêt(e) à les partager avec vous ou avec la police.\n\n`;

            msg += `S'il vous plaît, ne me répondez pas avec un message automatique. J'ai besoin d'un être humain qui va vraiment prendre mon cas en main.\n\n`;

            msg += `Dans l'attente de votre retour,\n\n`;

            if (nom) {
                msg += `Cordialement,\nUne victime de ${nom}`;
            } else {
                msg += `Cordialement,\nUne victime qui a besoin d'aide`;
            }

            return msg;
        }

        function startGeneration() {
            if (isGenerating) return;

            const output = document.getElementById('message-output');
            const box = document.getElementById('generated-box');
            const btnGen = document.getElementById('btn-generate');
            const btnCopy = document.getElementById('btn-copy');
            const btnWa = document.getElementById('btn-wa');
            const status = document.getElementById('status-text');

            isGenerating = true;
            btnGen.disabled = true;
            btnCopy.disabled = true;
            btnWa.disabled = true;
            status.textContent = '⏳ Génération du message...';
            output.textContent = '';
            box.classList.add('visible');

            const fullMessage = generateFullMessage();
            const chars = fullMessage.split('');
            let index = 0;
            displayText = '';

            function typeNextChar() {
                if (index < chars.length) {
                    displayText += chars[index];
                    output.textContent = displayText;
                    index++;
                    const delay = chars[index - 1] === '\n' ? 30 : 8 + Math.random() * 15;
                    setTimeout(typeNextChar, delay);
                } else {
                    isGenerating = false;
                    btnGen.disabled = false;
                    btnCopy.disabled = false;
                    btnWa.disabled = false;
                    status.textContent = '✅ Message prêt — TRÈS CONVAINCANT';
                    showToast('✅ Message puissant généré');
                }
            }

            setTimeout(typeNextChar, 150);
        }

        function copyMessage() {
            const text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Générez un message d\'abord');
            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 Copié dans le presse-papiers');
            }).catch(() => {
                const area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copié');
            });
        }

        function sendWhatsApp() {
            const text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Générez un message d\'abord');

            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 Message copié ! Ouverture WhatsApp...');
            }).catch(() => {
                const area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Message copié ! Ouverture WhatsApp...');
            });

            setTimeout(() => {
                window.open('https://wa.me/', '_blank');
            }, 500);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('generated-box').classList.remove('visible');
            document.getElementById('message-output').textContent = '';
            document.getElementById('status-text').textContent = 'Remplissez le formulaire et cliquez sur GENERATE';
        });
    </script>

</body>
</html>
